name: Repo Drift Audit

on:
  pull_request:
  push:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Repo Drift Audit
        run: python scripts/audit_repo_drift.py --strict

      - name: Run GraphRAG Pipeline Unit Tests
        run: python -m unittest discover graphrag_pipeline/tests
