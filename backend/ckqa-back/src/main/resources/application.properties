spring.application.name=ckqa-back
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:23306}/${MYSQL_DATABASE:ocqa}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=is_deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

ckqa.cors.enabled=${CKQA_CORS_ENABLED:true}
ckqa.cors.allowed-origin-patterns=${CKQA_CORS_ALLOWED_ORIGIN_PATTERNS:http://127.0.0.1:*,http://localhost:*}

ckqa.integration.pdf-ingest.python=${PDF_INGEST_PYTHON:}
ckqa.integration.pdf-ingest.root=${PDF_INGEST_ROOT:}
ckqa.integration.graphrag.python=${GRAPHRAG_PYTHON:}
ckqa.integration.graphrag.root=${GRAPHRAG_ROOT:}
ckqa.integration.graphrag.api-base-url=${GRAPHRAG_API_BASE_URL:http://127.0.0.1:8012}
ckqa.integration.polling.query-task-interval-seconds=${QUERY_TASK_POLLING_INTERVAL_SECONDS:10}
ckqa.integration.polling.query-task-mode-interval-seconds.local=${QUERY_TASK_POLLING_INTERVAL_SECONDS_LOCAL:10}
ckqa.integration.polling.query-task-mode-interval-seconds.global=${QUERY_TASK_POLLING_INTERVAL_SECONDS_GLOBAL:30}
ckqa.integration.polling.query-task-mode-interval-seconds.basic=${QUERY_TASK_POLLING_INTERVAL_SECONDS_BASIC:10}
ckqa.integration.polling.query-task-mode-interval-seconds.drift=${QUERY_TASK_POLLING_INTERVAL_SECONDS_DRIFT:30}
ckqa.integration.timeout.parse-seconds=${PARSE_TIMEOUT_SECONDS:900}
ckqa.integration.timeout.export-seconds=${EXPORT_TIMEOUT_SECONDS:300}
ckqa.integration.timeout.fetch-seconds=${FETCH_TIMEOUT_SECONDS:300}
ckqa.integration.timeout.index-seconds=${INDEX_TIMEOUT_SECONDS:1800}
ckqa.integration.timeout.query-seconds=${QUERY_TIMEOUT_SECONDS:120}
ckqa.integration.timeout.index-stale-seconds=${INDEX_STALE_SECONDS:2400}
ckqa.integration.timeout.query-task-stale-seconds=${QUERY_TASK_STALE_SECONDS:300}
ckqa.integration.timeout.query-task-mode-stale-seconds.local=${QUERY_TASK_STALE_SECONDS_LOCAL:300}
ckqa.integration.timeout.query-task-mode-stale-seconds.global=${QUERY_TASK_STALE_SECONDS_GLOBAL:1800}
ckqa.integration.timeout.query-task-mode-stale-seconds.basic=${QUERY_TASK_STALE_SECONDS_BASIC:300}
ckqa.integration.timeout.query-task-mode-stale-seconds.drift=${QUERY_TASK_STALE_SECONDS_DRIFT:1800}
ckqa.integration.timeout.query-task-mode-timeout-messages.local=${QUERY_TASK_TIMEOUT_MESSAGE_LOCAL:local 模式实测可能需要 2 分钟左右；任务心跳超过阈值未更新后会被标记为 stale。}
ckqa.integration.timeout.query-task-mode-timeout-messages.global=${QUERY_TASK_TIMEOUT_MESSAGE_GLOBAL:global 模式实测可能需要 10 到 20 分钟；建议前端低频轮询并展示长耗时提示。}
ckqa.integration.timeout.query-task-mode-timeout-messages.basic=${QUERY_TASK_TIMEOUT_MESSAGE_BASIC:basic 模式沿用轻量查询策略；任务心跳超过阈值未更新后会被标记为 stale。}
ckqa.integration.timeout.query-task-mode-timeout-messages.drift=${QUERY_TASK_TIMEOUT_MESSAGE_DRIFT:drift 模式实测可能需要 10 到 20 分钟；建议前端低频轮询并展示长耗时提示。}
