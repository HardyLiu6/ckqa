spring.application.name=ckqa-back
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:23306}/${MYSQL_DATABASE:ocqa}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=is_deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

ckqa.cors.enabled=${CKQA_CORS_ENABLED:true}
ckqa.cors.allowed-origin-patterns=${CKQA_CORS_ALLOWED_ORIGIN_PATTERNS:http://127.0.0.1:*,http://localhost:*}

ckqa.jwt.secret=${CKQA_JWT_SECRET:ckqa-local-dev-jwt-secret-change-me-at-runtime-2026}
ckqa.jwt.issuer=${CKQA_JWT_ISSUER:ckqa-back}
ckqa.jwt.ttl=${CKQA_JWT_TTL:PT8H}

# Redis 连接（限频计数器 / 邮箱验证码缓存）
spring.data.redis.host=${CKQA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${CKQA_REDIS_PORT:16379}
spring.data.redis.timeout=${CKQA_REDIS_TIMEOUT:3s}
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# 学生端服务端读缓存：Redis 故障时 fail-open 回源
ckqa.student-cache.enabled=${CKQA_STUDENT_CACHE_ENABLED:true}
ckqa.student-cache.prefix=${CKQA_STUDENT_CACHE_PREFIX:ckqa:student-cache:v1}
ckqa.student-cache.course-ttl=${CKQA_STUDENT_CACHE_COURSE_TTL:PT60S}
ckqa.student-cache.course-kb-ttl=${CKQA_STUDENT_CACHE_COURSE_KB_TTL:PT60S}
ckqa.student-cache.routing-ttl=${CKQA_STUDENT_CACHE_ROUTING_TTL:PT5M}
ckqa.student-cache.hybrid-ready-ttl=${CKQA_STUDENT_CACHE_HYBRID_READY_TTL:PT5M}
ckqa.student-cache.hybrid-not-ready-ttl=${CKQA_STUDENT_CACHE_HYBRID_NOT_READY_TTL:PT15S}

# 学生端无显式课程时的课程画像语义路由
ckqa.course-routing.enabled=${CKQA_COURSE_ROUTING_ENABLED:true}
ckqa.course-routing.top-k=${CKQA_COURSE_ROUTING_TOP_K:3}
ckqa.course-routing.score-threshold=${CKQA_COURSE_ROUTING_SCORE_THRESHOLD:0.35}
ckqa.course-routing.margin-threshold=${CKQA_COURSE_ROUTING_MARGIN_THRESHOLD:0.06}
ckqa.course-routing.embedding-model=${GRAPHRAG_EMBEDDING_MODEL:text-embedding-v4}
ckqa.course-routing.embedding-dimensions=${CKQA_COURSE_ROUTING_EMBEDDING_DIMENSIONS:1024}
ckqa.course-routing.lancedb-table=${CKQA_COURSE_ROUTING_LANCEDB_TABLE:course_profiles_text_embedding_v4}
ckqa.course-routing.profile-hints-enabled=${CKQA_COURSE_ROUTING_PROFILE_HINTS_ENABLED:true}
ckqa.course-routing.profile-hints-max-hints=${CKQA_COURSE_ROUTING_PROFILE_HINTS_MAX_HINTS:24}
ckqa.course-routing.excluded-course-ids=${CKQA_COURSE_ROUTING_EXCLUDED_COURSE_IDS:crs-20260505-r5z6kq}
ckqa.course-routing.excluded-course-tags=${CKQA_COURSE_ROUTING_EXCLUDED_COURSE_TAGS:course-routing-excluded,internal}

# 登录限频与邮箱登录配置
ckqa.security.login.max-failures=${CKQA_LOGIN_MAX_FAILURES:5}
ckqa.security.login.failure-window=${CKQA_LOGIN_FAILURE_WINDOW:PT15M}
ckqa.security.login.lock-duration=${CKQA_LOGIN_LOCK_DURATION:PT5M}
ckqa.security.email-code.length=${CKQA_EMAIL_CODE_LENGTH:6}
ckqa.security.email-code.ttl=${CKQA_EMAIL_CODE_TTL:PT5M}
ckqa.security.email-code.send-cooldown=${CKQA_EMAIL_CODE_COOLDOWN:PT60S}
ckqa.security.email-code.daily-quota=${CKQA_EMAIL_CODE_DAILY_QUOTA:5}
ckqa.security.turnstile.enabled=${CKQA_TURNSTILE_ENABLED:false}
ckqa.security.turnstile.secret-key=${CKQA_TURNSTILE_SECRET_KEY:}
ckqa.security.turnstile.verify-url=${CKQA_TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}

# 邮件发送：mailer-type=log（默认，把验证码打到日志）/ smtp（需配置 host/port/username/password）
ckqa.email.mailer-type=${CKQA_EMAIL_MAILER_TYPE:log}
ckqa.email.from-address=${CKQA_EMAIL_FROM_ADDRESS:noreply@ckqa.local}
ckqa.email.from-name=${CKQA_EMAIL_FROM_NAME:\u667a\u8bfe\u95ee\u7b54}
ckqa.email.smtp.host=${CKQA_EMAIL_SMTP_HOST:}
ckqa.email.smtp.port=${CKQA_EMAIL_SMTP_PORT:465}
ckqa.email.smtp.username=${CKQA_EMAIL_SMTP_USERNAME:}
ckqa.email.smtp.password=${CKQA_EMAIL_SMTP_PASSWORD:}
ckqa.email.smtp.ssl=${CKQA_EMAIL_SMTP_SSL:true}

ckqa.course-cover.endpoint=${MINIO_ENDPOINT:localhost:9000}
ckqa.course-cover.access-key=${MINIO_ACCESS_KEY:${MINIO_ROOT_USER:admin}}
ckqa.course-cover.secret-key=${MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:12345678}}
ckqa.course-cover.secure=${MINIO_SECURE:false}
ckqa.course-cover.bucket-name=${COURSE_COVER_BUCKET:course-artifacts}
ckqa.course-cover.object-prefix=${COURSE_COVER_OBJECT_PREFIX:course-covers}
ckqa.course-cover.public-path-prefix=/api/v1/course-covers
ckqa.course-cover.max-file-size-bytes=${COURSE_COVER_MAX_FILE_SIZE_BYTES:2097152}

ckqa.user-avatar.bucket-name=${USER_AVATAR_BUCKET:${COURSE_COVER_BUCKET:course-artifacts}}
ckqa.user-avatar.object-prefix=${USER_AVATAR_OBJECT_PREFIX:user-avatars}
ckqa.user-avatar.public-path-prefix=/api/v1/user-avatars
ckqa.user-avatar.max-file-size-bytes=${USER_AVATAR_MAX_FILE_SIZE_BYTES:2097152}

ckqa.course-material.bucket-name=${COURSE_MATERIAL_BUCKET:${COURSE_COVER_BUCKET:course-artifacts}}
ckqa.course-material.object-prefix=${COURSE_MATERIAL_OBJECT_PREFIX:course-materials}
ckqa.course-material.max-file-size-bytes=${COURSE_MATERIAL_MAX_FILE_SIZE_BYTES:209715200}

spring.servlet.multipart.max-file-size=${CKQA_MULTIPART_MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${CKQA_MULTIPART_MAX_REQUEST_SIZE:200MB}

ckqa.integration.pdf-ingest.python=${PDF_INGEST_PYTHON:}
ckqa.integration.pdf-ingest.root=${PDF_INGEST_ROOT:}
ckqa.integration.graphrag.python=${GRAPHRAG_PYTHON:}
ckqa.integration.graphrag.root=${GRAPHRAG_ROOT:}
ckqa.integration.graphrag.api-base-url=${GRAPHRAG_API_BASE_URL:http://${GRAPHRAG_API_HOST:127.0.0.1}:${GRAPHRAG_API_PORT:8012}}
ckqa.integration.graphrag.build-runs-root=${GRAPHRAG_BUILD_RUNS_ROOT:}
ckqa.integration.timeout.prompt-tune-seconds=${GRAPHRAG_PROMPT_TUNE_SECONDS:1800}
ckqa.integration.timeout.prompt-tune-stale-seconds=${GRAPHRAG_PROMPT_TUNE_STALE_SECONDS:2400}
ckqa.integration.graphrag.concurrent-builds-enabled=${GRAPHRAG_ALLOW_CONCURRENT_KB_BUILDS:true}
ckqa.integration.graphrag.auto-activation-policy=${GRAPHRAG_AUTO_ACTIVATION_POLICY:latest-build-only}
ckqa.integration.graphrag.retention.keep-success-build-runs=${GRAPHRAG_KEEP_SUCCESS_BUILD_RUNS:3}
ckqa.integration.graphrag.retention.keep-failed-build-runs=${GRAPHRAG_KEEP_FAILED_BUILD_RUNS:3}
ckqa.integration.graphrag.retention.auto-cleanup-enabled=${GRAPHRAG_BUILD_RUN_AUTO_CLEANUP_ENABLED:false}
ckqa.integration.graphrag.managed-api.enabled=${GRAPHRAG_API_MANAGED_ENABLED:false}
ckqa.integration.graphrag.managed-api.host=${GRAPHRAG_API_HOST:127.0.0.1}
ckqa.integration.graphrag.managed-api.port=${GRAPHRAG_API_PORT:8012}
ckqa.integration.graphrag.managed-api.conda-env=${GRAPHRAG_CONDA_ENV:graphrag-oneapi}
ckqa.integration.graphrag.managed-api.output-dir=${GRAPHRAG_OUTPUT_DIR:}
ckqa.integration.graphrag.managed-api.storage-dir=${GRAPHRAG_STORAGE_DIR:}
ckqa.integration.graphrag.managed-api.lancedb-uri=${GRAPHRAG_LANCEDB_URI:}

# Neo4j（学生端知识图谱只读查询；无独立 schema 隔离时与 graphrag-pipeline 灌库脚本共享同一实例）
ckqa.neo4j.enabled=${CKQA_NEO4J_ENABLED:true}
ckqa.neo4j.uri=${NEO4J_URI:bolt://${CKQA_NEO4J_HOST:127.0.0.1}:${CKQA_NEO4J_BOLT_PORT:17687}}
ckqa.neo4j.username=${NEO4J_USERNAME:neo4j}
ckqa.neo4j.password=${NEO4J_PASSWORD:neo4j_password_change_me}
ckqa.neo4j.database=${NEO4J_DATABASE:neo4j}
ckqa.neo4j.read-timeout-millis=${CKQA_NEO4J_READ_TIMEOUT_MS:5000}
ckqa.integration.graphrag.managed-api.skip-if-reachable=${GRAPHRAG_API_SKIP_MANAGED_IF_REACHABLE:true}
ckqa.integration.graphrag.managed-api.stop-timeout-seconds=${GRAPHRAG_API_STOP_TIMEOUT_SECONDS:5}
ckqa.integration.summary.enabled=${CKQA_SUMMARY_ENABLED:true}
ckqa.integration.summary.api-base-url=${CKQA_SUMMARY_API_BASE_URL:${ONE_API_BASE_URL:http://127.0.0.1:3000/v1}}
ckqa.integration.summary.api-key=${CKQA_SUMMARY_API_KEY:${ONE_API_KEY:}}
ckqa.integration.summary.model=${CKQA_SUMMARY_MODEL:deepseek-v4-flash}
ckqa.integration.summary.max-chars=${CKQA_SUMMARY_MAX_CHARS:800}
ckqa.integration.summary.trigger-message-count=${CKQA_SUMMARY_TRIGGER_MESSAGE_COUNT:12}
ckqa.integration.summary.trigger-char-count=${CKQA_SUMMARY_TRIGGER_CHAR_COUNT:3000}
ckqa.integration.summary.thinking-disabled=${CKQA_SUMMARY_THINKING_DISABLED:true}
ckqa.integration.summary.timeout-seconds=${CKQA_SUMMARY_TIMEOUT_SECONDS:30}
ckqa.integration.rewrite.enabled=${CKQA_REWRITE_ENABLED:true}
ckqa.integration.rewrite.api-base-url=${CKQA_REWRITE_API_BASE_URL:${ONE_API_BASE_URL:http://127.0.0.1:3000/v1}}
ckqa.integration.rewrite.api-key=${CKQA_REWRITE_API_KEY:${ONE_API_KEY:}}
ckqa.integration.rewrite.model=${CKQA_REWRITE_MODEL:deepseek-v4-flash}
ckqa.integration.rewrite.max-chars=${CKQA_REWRITE_MAX_CHARS:800}
ckqa.integration.rewrite.min-confidence=${CKQA_REWRITE_MIN_CONFIDENCE:0.6}
ckqa.integration.rewrite.thinking-disabled=${CKQA_REWRITE_THINKING_DISABLED:true}
ckqa.integration.rewrite.timeout-seconds=${CKQA_REWRITE_TIMEOUT_SECONDS:20}
ckqa.integration.polling.query-task-interval-seconds=${QUERY_TASK_POLLING_INTERVAL_SECONDS:10}
ckqa.integration.polling.query-task-mode-interval-seconds.local=${QUERY_TASK_POLLING_INTERVAL_SECONDS_LOCAL:10}
ckqa.integration.polling.query-task-mode-interval-seconds.global=${QUERY_TASK_POLLING_INTERVAL_SECONDS_GLOBAL:30}
ckqa.integration.polling.query-task-mode-interval-seconds.basic=${QUERY_TASK_POLLING_INTERVAL_SECONDS_BASIC:10}
ckqa.integration.polling.query-task-mode-interval-seconds.drift=${QUERY_TASK_POLLING_INTERVAL_SECONDS_DRIFT:30}
ckqa.integration.polling.query-task-mode-interval-seconds.hybrid_v0=${QUERY_TASK_POLLING_INTERVAL_SECONDS_HYBRID_V0:30}
ckqa.integration.timeout.parse-seconds=${PARSE_TIMEOUT_SECONDS:900}
ckqa.integration.timeout.export-seconds=${EXPORT_TIMEOUT_SECONDS:300}
ckqa.integration.timeout.fetch-seconds=${FETCH_TIMEOUT_SECONDS:300}
ckqa.integration.timeout.index-seconds=${INDEX_TIMEOUT_SECONDS:1800}
ckqa.integration.timeout.query-seconds=${QUERY_TIMEOUT_SECONDS:120}
ckqa.integration.timeout.index-stale-seconds=${INDEX_STALE_SECONDS:2400}
ckqa.integration.timeout.query-task-stale-seconds=${QUERY_TASK_STALE_SECONDS:300}
ckqa.integration.timeout.query-task-mode-stale-seconds.local=${QUERY_TASK_STALE_SECONDS_LOCAL:300}
ckqa.integration.timeout.query-task-mode-stale-seconds.global=${QUERY_TASK_STALE_SECONDS_GLOBAL:1800}
ckqa.integration.timeout.query-task-mode-stale-seconds.basic=${QUERY_TASK_STALE_SECONDS_BASIC:300}
ckqa.integration.timeout.query-task-mode-stale-seconds.drift=${QUERY_TASK_STALE_SECONDS_DRIFT:1800}
ckqa.integration.timeout.query-task-mode-stale-seconds.hybrid_v0=${QUERY_TASK_STALE_SECONDS_HYBRID_V0:1800}
ckqa.integration.timeout.query-task-mode-timeout-messages.local=${QUERY_TASK_TIMEOUT_MESSAGE_LOCAL:local \u6a21\u5f0f\u6b63\u5728\u7ed3\u5408\u8bfe\u7a0b\u4e0a\u4e0b\u6587\u751f\u6210\u56de\u7b54\uff0c\u7b49\u5f85\u65f6\u95f4\u8f83\u957f\u65f6\u4f1a\u5c3d\u91cf\u4fdd\u7559\u5df2\u751f\u6210\u5185\u5bb9\u3002}
ckqa.integration.timeout.query-task-mode-timeout-messages.global=${QUERY_TASK_TIMEOUT_MESSAGE_GLOBAL:global \u6a21\u5f0f\u6b63\u5728\u6c47\u603b\u8bfe\u7a0b\u62a5\u544a\u4e0e\u4e3b\u9898\u8981\u70b9\uff0c\u7b49\u5f85\u65f6\u95f4\u8f83\u957f\u65f6\u4f1a\u5c3d\u91cf\u4fdd\u7559\u5df2\u751f\u6210\u5185\u5bb9\u3002}
ckqa.integration.timeout.query-task-mode-timeout-messages.basic=${QUERY_TASK_TIMEOUT_MESSAGE_BASIC:basic \u6a21\u5f0f\u6b63\u5728\u68c0\u7d22\u8bfe\u7a0b\u7247\u6bb5\u5e76\u751f\u6210\u56de\u7b54\uff0c\u7b49\u5f85\u65f6\u95f4\u8f83\u957f\u65f6\u4f1a\u5c3d\u91cf\u4fdd\u7559\u5df2\u751f\u6210\u5185\u5bb9\u3002}
ckqa.integration.timeout.query-task-mode-timeout-messages.drift=${QUERY_TASK_TIMEOUT_MESSAGE_DRIFT:drift \u6a21\u5f0f\u6b63\u5728\u6cbf\u76f8\u5173\u7ebf\u7d22\u5c55\u5f00\u8ffd\u95ee\u68c0\u7d22\uff0c\u7b49\u5f85\u65f6\u95f4\u8f83\u957f\u65f6\u4f1a\u5c3d\u91cf\u4fdd\u7559\u5df2\u751f\u6210\u5185\u5bb9\u3002}
ckqa.integration.timeout.query-task-mode-timeout-messages.hybrid_v0=${QUERY_TASK_TIMEOUT_MESSAGE_HYBRID_V0:\u6df7\u5408\u68c0\u7d22 Beta \u6a21\u5f0f\u6b63\u5728\u878d\u5408\u591a\u8def\u8bc1\u636e\uff0c\u7b49\u5f85\u65f6\u95f4\u8f83\u957f\u65f6\u4f1a\u5c3d\u91cf\u4fdd\u7559\u5df2\u751f\u6210\u5185\u5bb9\u3002}

# 学生端 QA 任务 SSE 事件流：只推送状态和最终答案分段，不持久化 partial token
ckqa.qa-stream.enabled=${CKQA_QA_STREAM_ENABLED:true}
ckqa.qa-stream.timeout-seconds=${CKQA_QA_STREAM_TIMEOUT_SECONDS:600}
ckqa.qa-stream.status-interval-seconds=${CKQA_QA_STREAM_STATUS_INTERVAL_SECONDS:2}
ckqa.qa-stream.heartbeat-seconds=${CKQA_QA_STREAM_HEARTBEAT_SECONDS:15}
ckqa.qa-stream.delta-chars=${CKQA_QA_STREAM_DELTA_CHARS:120}
ckqa.integration.streaming.python-stream-enabled=${CKQA_QA_PYTHON_STREAM_ENABLED:true}
ckqa.integration.streaming.python-stream-modes=${CKQA_QA_PYTHON_STREAM_MODES:basic,local,global,drift,hybrid_v0}
ckqa.integration.streaming.python-stream-connect-timeout-seconds=${CKQA_QA_PYTHON_STREAM_CONNECT_TIMEOUT_SECONDS:10}
ckqa.integration.streaming.python-stream-read-timeout-seconds=${CKQA_QA_PYTHON_STREAM_READ_TIMEOUT_SECONDS:600}
