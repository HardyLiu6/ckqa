### This config file contains required core defaults that must be set, along with a handful of common optional settings.
### For a full list of available settings, see https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###
## There are a number of settings to tune the threading and token limits for LLM calls - check the docs.

completion_models:
  # Legacy fallback for disabled or future workflow blocks that still reference
  # the default model id. Active stages below bind to explicit model ids.
  default_completion_model:
    model_provider: openai
    model: ${GRAPHRAG_QUERY_MODEL}
    auth_method: api_key # or azure_managed_identity
    api_key: ${GRAPHRAG_CHAT_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff
  extraction_completion_model:
    model_provider: openai
    model: ${GRAPHRAG_EXTRACTION_MODEL}
    auth_method: api_key # or azure_managed_identity
    api_key: ${GRAPHRAG_CHAT_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff
  summary_completion_model:
    model_provider: openai
    model: ${GRAPHRAG_SUMMARY_MODEL}
    auth_method: api_key # or azure_managed_identity
    api_key: ${GRAPHRAG_CHAT_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff
  query_completion_model:
    model_provider: openai
    model: ${GRAPHRAG_QUERY_MODEL}
    auth_method: api_key # or azure_managed_identity
    api_key: ${GRAPHRAG_CHAT_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_EMBEDDING_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    call_args:
      encoding_format: float
    retry:
      type: exponential_backoff

### Document processing settings ###

input:
  type: json # [csv, text, json, jsonl]
  text_column: text
  title_column: title
  metadata:
    - id
    - document_type
    - chapter
    - section
    - subsection
    - heading_level
    - heading_path_text
    - doc_unit
    - page_start
    - page_end
    - page_no
    - section_level
    - source_file
    - course_id

chunking:
  type: tokens
  size: 1000
  overlap: 100
  encoding_model: o200k_base
  prepend_metadata:
    - document_type
    - chapter
    - section
    - subsection
    - heading_level
    - heading_path_text
    - page_start
    - page_end
    - section_level
    - source_file
    - course_id

### Storage settings ###
## If blob storage is specified in the following four sections,
## connection_string and container_name must be provided

input_storage:
  type: file # [file, blob, cosmosdb]
  base_dir: ${GRAPHRAG_INPUT_DIR}

output_storage:
  type: file # [file, blob, cosmosdb]
  base_dir: ${GRAPHRAG_STORAGE_DIR}

reporting:
  type: file # [file, blob]
  base_dir: ${GRAPHRAG_REPORTING_DIR}

cache:
  type: json # [json, memory, none]
  storage:
    type: file # [file, blob, cosmosdb]
    base_dir: ${GRAPHRAG_CACHE_DIR}
    
vector_store:
  type: lancedb
  db_uri: ${GRAPHRAG_STORAGE_DIR}/lancedb

### Workflow settings ###

embed_text:
  embedding_model_id: default_embedding_model
  batch_size: 10

extract_graph:
  completion_model_id: extraction_completion_model
  prompt: ${GRAPHRAG_ENTITY_EXTRACTION_PROMPT_FILE}
  entity_types: [organization,person,geo,event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: summary_completion_model
  prompt: ${GRAPHRAG_SUMMARIZE_DESCRIPTIONS_PROMPT_FILE}
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english # [regex_english, syntactic_parser, cfg]

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: ${GRAPHRAG_CLAIM_EXTRACTION_PROMPT_FILE}
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: summary_completion_model
  graph_prompt: ${GRAPHRAG_COMMUNITY_REPORT_GRAPH_PROMPT_FILE}
  text_prompt: ${GRAPHRAG_COMMUNITY_REPORT_TEXT_PROMPT_FILE}
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings ###
## The prompt locations are required here, but each search method has a number of optional knobs that can be tuned.
## See the config docs: https://microsoft.github.io/graphrag/config/yaml/#query

local_search:
  completion_model_id: query_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: query_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: query_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: query_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
