name: ckqa-infra

services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql
    restart: unless-stopped
    ports:
      - "${CKQA_MYSQL_PORT:-23306}:3306"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 infra/.env 中设置 MYSQL_ROOT_PASSWORD；复用旧数据时必须填写当前 MySQL root 密码}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ocqa}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - type: bind
        source: ${CKQA_MYSQL_DATA_DIR:-/home/sunlight/mysql/data}
        target: /var/lib/mysql
      - type: bind
        source: ../sql
        target: /docker-entrypoint-initdb.d
        read_only: true
    networks:
      - ckqa-infra

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "${CKQA_MINIO_API_PORT:-9000}:9000"
      - "${CKQA_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?请在 infra/.env 中设置 MINIO_ROOT_USER；复用旧数据时建议填写当前容器账号}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请在 infra/.env 中设置 MINIO_ROOT_PASSWORD；复用旧数据时建议填写当前容器密码}
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - type: bind
        source: ${CKQA_MINIO_DATA_DIR:-/home/sunlight/minio/data}
        target: /data
    networks:
      - ckqa-infra

  one-api:
    image: justsong/one-api:latest
    container_name: one-api
    restart: unless-stopped
    ports:
      - "${CKQA_ONE_API_PORT:-3301}:3000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - type: bind
        source: ./one-api/one-api/data
        target: /data
    networks:
      - ckqa-infra

  neo4j:
    image: neo4j:2025.12.1
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "${CKQA_NEO4J_HTTP_PORT:-17474}:7474"
      - "${CKQA_NEO4J_BOLT_PORT:-17687}:7687"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4j_password_change_me}
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_server_memory_heap_max__size: ${CKQA_NEO4J_HEAP_MAX:-2G}
      NEO4J_server_memory_pagecache_size: ${CKQA_NEO4J_PAGECACHE:-1G}
    volumes:
      - type: bind
        source: ./neo4j/neo4j/data
        target: /data
      - type: bind
        source: ./neo4j/neo4j/logs
        target: /logs
      - type: bind
        source: ./neo4j/neo4j/import
        target: /import
      - type: bind
        source: ./neo4j/neo4j/plugins
        target: /plugins
      - type: bind
        source: ./neo4j/neo4j/conf
        target: /conf
    networks:
      - ckqa-infra

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${CKQA_REDIS_PORT:-16379}:6379"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 本地调试固定匿名访问；Redis 仅绑定到本机转发端口，不作为业务事实源。
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - type: bind
        source: ./redis/data
        target: /data
    networks:
      - ckqa-infra

networks:
  ckqa-infra:
    name: ckqa-infra
